{% extends "base.html" %}

{% block content %}
<div class="min-h-full flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 bg-white p-10 rounded-xl shadow-lg border border-gray-100">

        <div class="text-center flex flex-col items-center">
            {% if settings.logo_filename %}
            <img class="max-h-16 w-auto"
                src="{{ url_for('static', filename='uploads/logo/' + settings.logo_filename) }}" alt="Company Logo">
            {% else %}
            <h2 class="text-3xl font-extrabold text-gray-900">{{ settings.company_name }}</h2>
            {% endif %}

            {% if settings.description %}
            <p class="mt-4 text-sm text-gray-600 line-clamp-2">{{ settings.description }}</p>
            {% endif %}

            <h2 class="mt-6 text-2xl font-bold text-gray-900">Sign in to your account</h2>
        </div>

        <form class="mt-8 space-y-6" action="{{ url_for('auth.login') }}" method="POST">
            <div class="rounded-md shadow-sm space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700">Username</label>
                    <input id="username" name="username" type="text" required
                        class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm mt-1"
                        placeholder="admin">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
                    <div class="mt-1 relative rounded-md shadow-sm">
                        <input id="password" name="password" type="password" required
                            class="appearance-none rounded-md relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm"
                            placeholder="••••••••">
                        <button type="button" onclick="togglePassword()"
                            class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5 text-gray-500 hover:text-gray-700">
                            Show
                        </button>
                    </div>
                </div>
            </div>

            <div>
                <button type="submit"
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white btn-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    Sign in
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    function togglePassword() {
        var x = document.getElementById("password");
        var btn = event.currentTarget;
        if (x.type === "password") {
            x.type = "text";
            btn.innerText = "Hide";
        } else {
            x.type = "password";
            btn.innerText = "Show";
        }
    }
</script>
{% endblock %}
