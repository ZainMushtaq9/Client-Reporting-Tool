{% extends "base.html" %}

{% block content %}
<div class="max-w-3xl mx-auto">
    <div class="mb-6 flex items-center justify-between">
        <h2 class="text-2xl font-bold text-gray-900">Add New Client</h2>
        <a href="{{ url_for('clients.list_clients') }}"
            class="text-sm font-medium text-gray-600 hover:text-gray-900">&larr; Back to Clients</a>
    </div>

    <div class="bg-white shadow rounded-lg p-8 border border-gray-100">
        <form action="{{ url_for('clients.add') }}" method="POST" class="space-y-6">

            <div class="grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-2">
                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Client Name <span
                            class="text-red-500">*</span></label>
                    <input type="text" name="name" required
                        class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm py-2 px-3 border">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Client Email <span
                            class="text-red-500">*</span></label>
                    <input type="email" name="email" required
                        class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm py-2 px-3 border">
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Website URL</label>
                    <input type="text" name="website"
                        class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm py-2 px-3 border"
                        placeholder="https://example.com">
                </div>

                <div class="sm:col-span-2">
                    <label class="block text-sm font-medium text-gray-700">Industry</label>
                    <input type="text" name="industry"
                        class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm py-2 px-3 border"
                        placeholder="e.g. Healthcare, SaaS, E-commerce">
                </div>
            </div>

            <hr class="border-gray-200">

            <h3 class="text-lg font-medium text-gray-900">Reporting Settings</h3>

            <div class="space-y-4">
                <div class="flex items-start">
                    <div class="flex items-center h-5">
                        <input type="checkbox" name="report_email" id="report_email" checked
                            class="focus:ring-blue-500 h-4 w-4 text-blue-600 border-gray-300 rounded">
                    </div>
                    <div class="ml-3 text-sm">
                        <label for="report_email" class="font-medium text-gray-700">Enable Automated Email
                            Reports</label>
                        <p class="text-gray-500">Send PDF reports to this client automatically.</p>
                    </div>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 ml-7">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Frequency</label>
                        <select name="report_freq"
                            class="mt-1 block w-full pl-3 pr-10 py-2 border-gray-300 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm rounded-md border">
                            <option value="monthly">Monthly</option>
                            <option value="weekly">Weekly</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Day of Month (if monthly)</label>
                        <input type="number" name="report_day" value="1" min="1" max="28"
                            class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm py-2 px-3 border">
                    </div>
                </div>
            </div>

            <hr class="border-gray-200">

            <h3 class="text-lg font-medium text-gray-900">Dashboard Modules</h3>
            <div class="space-y-4">
                <label class="inline-flex items-center">
                    <input type="checkbox" name="show_ads" checked
                        class="h-4 w-4 text-blue-600 border-gray-300 rounded">
                    <span class="ml-2 text-sm text-gray-700">Include Paid Ads Section</span>
                </label>
                <br>
                <label class="inline-flex items-center">
                    <input type="checkbox" name="show_email_mkt" checked
                        class="h-4 w-4 text-blue-600 border-gray-300 rounded">
                    <span class="ml-2 text-sm text-gray-700">Include Email Marketing Section</span>
                </label>
            </div>

            <hr class="border-gray-200">

            <div>
                <label class="block text-sm font-medium text-gray-700">Internal Notes</label>
                <textarea name="notes" rows="3"
                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500 sm:text-sm border py-2 px-3"></textarea>
            </div>

            <div class="pt-4 flex justify-end">
                <button type="submit"
                    class="btn-primary inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">
                    Save Client
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
