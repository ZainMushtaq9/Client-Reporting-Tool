{% extends "base.html" %}

{% block content %}
<div class="max-w-xl mx-auto">
    <div class="mb-6 flex items-center justify-between">
        <h2 class="text-2xl font-bold text-gray-900">Add New User</h2>
        <a href="{{ url_for('users.index') }}" class="text-sm font-medium text-gray-600 hover:text-gray-900">&larr; Back
            to Users</a>
    </div>

    <div class="bg-white shadow rounded-lg p-8 border border-gray-100">
        <form action="{{ url_for('users.add') }}" method="POST" class="space-y-6">

            <div>
                <label class="block text-sm font-medium text-gray-700">Username <span
                        class="text-red-500">*</span></label>
                <input type="text" name="username" required minlength="3" maxlength="40" pattern="[a-zA-Z0-9_]+"
                    title="Only letters, numbers, and underscores allowed"
                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm sm:text-sm py-2 px-3 border">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Email Address <span
                        class="text-red-500">*</span></label>
                <input type="email" name="email" required
                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm sm:text-sm py-2 px-3 border">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Role</label>
                <select name="role"
                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm sm:text-sm py-2 px-3 border bg-white">
                    <option value="admin">Admin (Full Access)</option>
                    <option value="viewer">Viewer (Read-Only)</option>
                </select>
                <p class="text-xs text-gray-500 mt-1">Viewers cannot access Settings or User Management.</p>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password <span
                        class="text-red-500">*</span></label>
                <input type="password" name="password" id="password" required minlength="6"
                    class="mt-1 block w-full border-gray-300 rounded-md shadow-sm sm:text-sm py-2 px-3 border">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Confirm Password <span
                        class="text-red-500">*</span></label>
                <div class="relative">
                    <input type="password" name="confirm_password" id="confirm_password" required
                        class="mt-1 block w-full border-gray-300 rounded-md shadow-sm sm:text-sm py-2 px-3 border">
                </div>
            </div>

            <div class="pt-4 flex justify-end m-auto">
                <button type="submit"
                    class="btn-primary w-full inline-flex justify-center py-2 px-4 shadow-sm text-sm font-medium rounded-md text-white">
                    Create User
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
