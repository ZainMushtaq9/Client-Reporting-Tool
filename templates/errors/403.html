{% extends "base.html" %}

{% block content %}
<div class="min-h-full flex flex-col justify-center items-center py-12 px-4 sm:px-6 lg:px-8 text-center pt-32">
    <div class="h-24 w-24 bg-yellow-100 text-yellow-600 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
            </path>
        </svg>
    </div>
    <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight sm:text-5xl">403</h1>
    <p class="mt-2 text-lg text-gray-500">Access Denied.</p>
    <p class="mt-2 text-md text-gray-500 pb-8">You don't have permission to view this page. Admin privileges are
        required.</p>
    <a href="{{ url_for('dashboard.index') }}"
        class="btn-primary inline-flex justify-center py-2 px-6 shadow-sm text-sm font-medium rounded-md text-white">
        Go back to Dashboard
    </a>
</div>
{% endblock %}
